# ===================================
# Advanced Model Routing YAML Template (compatible with LiteLLM Router at the bottom layer)
# ===================================
# Supporting documentation: docs/LLM_CONFIG_GUIDE.md section 3.2
#
# Usage:
# 1. Copy this file as litellm_config.yaml
# 2. In .env Set up LITELLM_CONFIG=./litellm_config.yaml
# 3. Configure the model_list below according to needs.
#
# Key reference format:
#   api_key: "os.environ/ENV_VAR_NAME" → Read from environment variable, avoid writing to files
#   api_key: "sk-xxxxxxxx"              → Write directly(Not Recommended)
#
# More documentation: https://docs.litellm.ai/docs/proxy/configs
# ===================================

model_list:
  # --- siliconflow (OpenAI Compatible, Single Key Using Multiple Models) ---
  # This is an example channel for a custom OpenAI-compatible model
  - model_name: openai/Qwen/Qwen3.5-397B-A17B
    litellm_params:
      model: openai/Qwen/Qwen3.5-397B-A17B
      api_key: "os.environ/LITELLM_API_KEY" # Read Key from environment variables for security and leak prevention.
      api_base: https://api.siliconflow.cn/v1
      # The following configurations represent how to enable the enable_thinking switch for the Qwen model
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

  # --- AIHubmix (OpenAI compatible, a key uses multiple models) ---
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1

  - model_name: openai/claude-3-5-sonnet-20241022
    litellm_params:
      model: openai/claude-3-5-sonnet-20241022
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1

  # --- DeepSeek Official API (native provider, automatically parses base_url) ---
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # --- Google Gemini (Native, Multi-Key Load Balancing) ---
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_1"

  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_2"

  # --- Anthropic Claude (Native) ---
  # - model_name: anthropic/claude-3-5-sonnet-20241022
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-20241022
  #     api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- OpenRouter (Aggregated Platform) ---
  # - model_name: openai/meta-llama/llama-3-70b-instruct
  #   litellm_params:
  #     model: openai/meta-llama/llama-3-70b-instruct
  #     api_key: "os.environ/OPENROUTER_API_KEY"
  #     api_base: https://openrouter.ai/api/v1

  # --- Ollama Local Model ---
  # - model_name: ollama/qwen3:8b
  #   litellm_params:
  #     model: ollama/qwen3:8b
  #     api_base: http://localhost:11434

# ===================================
# Router Configuration (Optional)
# ===================================
router_settings:
  routing_strategy: simple-shuffle    # simple-shuffle / least-busy / latency-based
  num_retries: 2                      # Retry count after a single deployment fails
  # timeout: 30                       # Request timeout (seconds)
  # allowed_fails: 3                  # deployment number of failed attempts allowed before cooling down
  # cooldown_time: 60                 # deployment cooling time(Seconds)
