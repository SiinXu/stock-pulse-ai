# Automated pull request review with syntax checks and AI-assisted semantic review.
# Trigger when a pull request is opened or updated.

name: PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.md'
      - '**.ts'
      - '**.tsx'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'apps/dsa-web/**'
      - 'requirements.txt'
      - '.github/requirements-ci.txt'
      - 'pyproject.toml'
      - 'setup.cfg'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'docker/Dockerfile'
      - 'docker-compose.yml'
  # Allow maintainers to rerun the review manually.
  workflow_dispatch:

# Avoid duplicate comments when the same pull request triggers multiple runs.
concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ==================== Security check for sensitive file changes ====================
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    outputs:
      safe_to_run: ${{ steps.check_sensitive.outputs.safe_to_run }}
      sensitive_files_changed: ${{ steps.check_sensitive.outputs.sensitive_files_changed }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      
      - name: 🔄 Fetch Base Branch
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🔒 Check Sensitive File Changes
        id: check_sensitive
        run: |
          escape_dynamic_text() {
            perl -CSDA -pe 's/([^\x00-\x7F]|&)/sprintf("\\u{%X}", ord($1))/ge'
          }
          BASE_REF="${{ github.base_ref || 'main' }}"
          SENSITIVE_FILES=$(git diff --name-only origin/$BASE_REF...HEAD | grep -E '^(\.github/workflows/.*\.yml|\.github/scripts/.*\.py)$' || echo "")
          
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "⚠️ **Sensitive files changed; manual review is required.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Changed sensitive files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$SENSITIVE_FILES" | escape_dynamic_text >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The change is flagged for focused manual review; automated checks will continue." >> $GITHUB_STEP_SUMMARY
            echo "sensitive_files_changed=true" >> $GITHUB_OUTPUT
            echo "safe_to_run=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No sensitive file changes detected" >> $GITHUB_STEP_SUMMARY
            echo "sensitive_files_changed=false" >> $GITHUB_OUTPUT
            echo "safe_to_run=true" >> $GITHUB_OUTPUT
          fi

  # ==================== Static checks before AI review ====================
  auto-check:
    name: 🔍 Static Checks
    runs-on: ubuntu-latest
    needs: [security-check]
    if: needs.security-check.outputs.safe_to_run == 'true'
    outputs:
      syntax_ok: ${{ steps.syntax.outputs.syntax_ok }}
      has_py_changes: ${{ steps.check_files.outputs.has_py_changes }}
      has_reviewable_changes: ${{ steps.check_files.outputs.has_reviewable_changes }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      
      - name: 🔄 Fetch Base Branch
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🐍 Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
      
      - name: 📋 Identify Changed Files
        id: check_files
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT origin/$BASE_REF...HEAD -- '*.py' 2>/dev/null || echo "")
          REVIEWABLE_FILES=$(git diff --name-only origin/$BASE_REF...HEAD -- '*.py' '*.md' 'docs/**' 'README.md' 'AGENTS.md' 'requirements.txt' '.github/requirements-ci.txt' 'pyproject.toml' 'setup.cfg' '.github/PULL_REQUEST_TEMPLATE.md' '.github/workflows/**' '.github/scripts/**' 2>/dev/null || echo "")

          if [ -z "$REVIEWABLE_FILES" ]; then
            echo "has_reviewable_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_reviewable_changes=true" >> $GITHUB_OUTPUT
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_py_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No Python files changed" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_py_changes=true" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
            echo "$CHANGED_FILES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
      
      - name: 🐍 Check Python Syntax
        id: syntax
        if: steps.check_files.outputs.has_py_changes == 'true'
        run: |
          escape_dynamic_text() {
            perl -CSDA -pe 's/([^\x00-\x7F]|&)/sprintf("\\u{%X}", ord($1))/ge'
          }
          echo "## 🐍 Python Syntax Check" >> $GITHUB_STEP_SUMMARY
          echo "$CHANGED_FILES" | escape_dynamic_text | sed 's/^/Checking file: /'
          
          ERRORS=""
          SYNTAX_OK="true"
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              if ! COMPILE_OUTPUT=$(python -m py_compile "$file" 2>&1); then
                if [ -n "$COMPILE_OUTPUT" ]; then
                  printf '%s\n' "$COMPILE_OUTPUT" | escape_dynamic_text
                fi
                ERRORS="$ERRORS\n❌ Syntax error in $file"
                SYNTAX_OK="false"
              fi
            fi
          done
          
          echo "syntax_ok=$SYNTAX_OK" >> $GITHUB_OUTPUT
          
          if [ "$SYNTAX_OK" = "false" ]; then
            echo -e "$ERRORS" | escape_dynamic_text >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All changed Python files have valid syntax" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 🔎 Check Critical Flake8 Errors
        if: steps.check_files.outputs.has_py_changes == 'true'
        run: |
          escape_dynamic_text() {
            perl -CSDA -pe 's/([^\x00-\x7F]|&)/sprintf("\\u{%X}", ord($1))/ge'
          }
          echo "## 🔎 Code Quality Check" >> $GITHUB_STEP_SUMMARY
          RESULT=$(flake8 $CHANGED_FILES --select=E9,F63,F7,F82 --format='%(path)s:%(row)d: %(code)s %(text)s' 2>/dev/null || true)
          if [ -n "$RESULT" ]; then
            echo "⚠️ The following critical issues were found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULT" | escape_dynamic_text >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No critical Flake8 issues found" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 📊 Summarize Changes
        run: |
          escape_dynamic_text() {
            perl -CSDA -pe 's/([^\x00-\x7F]|&)/sprintf("\\u{%X}", ord($1))/ge'
          }
          BASE_REF="${{ github.base_ref || 'main' }}"
          echo "## 📊 Change Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          STATS=$(git diff --stat origin/$BASE_REF...HEAD 2>/dev/null | tail -1)
          echo "$STATS" | escape_dynamic_text >> $GITHUB_STEP_SUMMARY

  # ==================== AI review after static checks pass ====================
  ai-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    needs: [security-check, auto-check]
    if: |
      needs.security-check.outputs.safe_to_run == 'true' &&
      needs.auto-check.result == 'success' &&
      needs.auto-check.outputs.has_reviewable_changes == 'true' &&
      vars.ENABLE_AI_REVIEW != 'false'
    
    steps:
      # Check out the default branch first to use its trusted review scripts.
      - name: 📥 Checkout Default-Branch Scripts
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false
          path: main-scripts
      
      # Check out the pull request code separately for diff analysis.
      - name: 📥 Checkout Pull Request Code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          path: pr-code
      
      - name: 🔄 Fetch Base Branch
        working-directory: pr-code
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🐍 Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 📦 Install Dependencies
        run: pip install google-genai openai httpx
      
      - name: 🤖 Review Changes with AI
        working-directory: pr-code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AI_REVIEW_STRICT: ${{ vars.AI_REVIEW_STRICT || 'false' }}
          CI_SYNTAX_OK: ${{ needs.auto-check.outputs.syntax_ok || '' }}
          CI_HAS_PY_CHANGES: ${{ needs.auto-check.outputs.has_py_changes || 'false' }}
          CI_AUTO_CHECK_RESULT: ${{ needs.auto-check.result || '' }}
        run: python ../main-scripts/.github/scripts/ai_review.py
      
      - name: 📤 Upload Review Result
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ai-review-result
          path: pr-code/ai_review_result.txt
          if-no-files-found: ignore

  # ==================== Automatic pull request labels ====================
  labeler:
    name: 🏷️ Automatic Labels
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
      
      - name: 🏷️ Add Labels
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            
            const labels = new Set();
            
            for (const file of files) {
              const filename = file.filename.toLowerCase();
              
              if (filename.includes('notification') || filename.includes('webhook')) {
                labels.add('notification');
              }
              if (filename.includes('feishu')) {
                labels.add('feishu');
              }
              if (filename.includes('data_provider') || filename.includes('fetcher')) {
                labels.add('data-source');
              }
              if (filename.includes('analyzer') || filename.includes('ai')) {
                labels.add('ai');
              }
              if (filename.endsWith('.md') || filename.includes('doc')) {
                labels.add('documentation');
              }
              if (filename.includes('workflow') || filename.includes('.github')) {
                labels.add('ci/cd');
              }
              if (filename.includes('config')) {
                labels.add('configuration');
              }
              if (filename.includes('test')) {
                labels.add('testing');
              }
            }
            
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const totalChanges = additions + deletions;
            
            if (totalChanges < 50) {
              labels.add('size/S');
            } else if (totalChanges < 200) {
              labels.add('size/M');
            } else if (totalChanges < 500) {
              labels.add('size/L');
            } else {
              labels.add('size/XL');
            }
            
            if (labels.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: Array.from(labels)
                });
                console.log(`Added labels: ${Array.from(labels).join(', ')}`);
              } catch (e) {
                console.log(`Failed to add labels: ${e.message}`);
              }
            }

  # ==================== Automated review comment ====================
  comment:
    name: 💬 Review Report
    runs-on: ubuntu-latest
    needs: [security-check, auto-check, ai-review]
    if: always() && github.event_name == 'pull_request_target' && needs.security-check.outputs.safe_to_run == 'true'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: 📥 Download AI Review Result
        uses: actions/download-artifact@v7
        if: needs.ai-review.result == 'success'
        continue-on-error: true
        with:
          name: ai-review-result
          path: .
      
      - name: 💬 Publish Review Report
        env:
          AUTO_CHECK_RESULT: ${{ needs.auto-check.result }}
          AI_REVIEW_RESULT: ${{ needs.ai-review.result }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const changedFiles = files.length;
            const unsafeDynamicPattern = /[^\x00-\x7F]|&/gu;
            const escapeDynamicText = value => value.replace(unsafeDynamicPattern, character => {
              const codePoint = character.codePointAt(0);
              const hexadecimal = codePoint.toString(16).toUpperCase();
              return codePoint <= 0xFFFF
                ? `\\u${hexadecimal.padStart(4, '0')}`
                : `\\u{${hexadecimal}}`;
            });
            const containsNonEnglishLetter = value => Array.from(value).some(character =>
              /\p{L}/u.test(character) && !/[A-Za-z]/.test(character)
            );
            const characterReferencePattern = /&(?:#[xX][0-9A-Fa-f]+|#\d+|[A-Za-z][A-Za-z0-9]+);/u;
            const containsCharacterReference = value => characterReferencePattern.test(value);
            
            let aiReview = '';
            try {
              aiReview = fs.readFileSync('ai_review_result.txt', 'utf8');
            } catch (e) {
              console.log('No AI review result found');
            }
            if (containsNonEnglishLetter(aiReview)) {
              console.log('AI review artifact omitted because it contains non-English letters');
              aiReview = '';
            }
            if (containsCharacterReference(aiReview)) {
              console.log('AI review artifact omitted because it contains an HTML character reference');
              aiReview = '';
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('## 🤖 Automated Review Report')
            );
            
            const checkStatus = process.env.AUTO_CHECK_RESULT === 'success' ? '✅ Passed' : '⚠️ Issues found';
            const aiStatus = aiReview ? '✅ Completed' :
                            process.env.AI_REVIEW_RESULT === 'skipped' ? '⏭️ Skipped' :
                            process.env.AI_REVIEW_RESULT === 'success' ? '⏭️ No publishable result' : '⚠️ Failed';
            
            let report = `## 🤖 Automated Review Report

            | Check | Result |
            |------|------|
            | 📊 Changed files | ${changedFiles} |
            | ➕ Added lines | ${additions} |
            | ➖ Deleted lines | ${deletions} |
            | 🔍 Static checks | ${checkStatus} |
            | 🧠 AI review | ${aiStatus} |

            ### 📁 Changed Files

            `;
            
            for (const file of files.slice(0, 20)) {
              const status = file.status === 'added' ? '🆕' : 
                            file.status === 'removed' ? '🗑️' : '📝';
              const displayFilename = escapeDynamicText(file.filename);
              report += `- ${status} \`${displayFilename}\` (+${file.additions}/-${file.deletions})\n`;
            }
            
            if (files.length > 20) {
              report += `\n... and ${files.length - 20} more files\n`;
            }
            
            if (aiReview) {
              report += `
            ---

            ### 🧠 AI Code Review

            ${aiReview}
            `;
            }
            
            report += `
            ---

            > 💡 **Reminder:** Make sure the code passes the relevant local tests and follows the repository standards.
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }
