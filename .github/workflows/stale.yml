# Mark and close inactive issues and pull requests.
# Run daily to find items that have not received a response.

name: Stale Issues & PRs

permissions: {}

on:
  schedule:
    # Run daily at 00:00 UTC.
    - cron: '0 0 * * *'
  # Allow manual runs.
  workflow_dispatch:

jobs:
  stale:
    name: 🧹 Clean Up Stale Issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    
    steps:
      - name: 🏷️ Mark and Close Stale Items
        uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          # ===== Issue settings =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has been inactive for **7 days**.
            
            If the problem still exists, reply with an update so we can continue investigating.
            If it has been resolved or is no longer needed, you can close this issue.
            
            **This issue will close automatically if there is no response within 7 days.**
          close-issue-message: |
            🔒 This issue was closed automatically because it remained inactive.
            
            If the problem still exists, reopen this issue or create a new one with current details.
          
          # ===== Pull request settings =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This pull request has been inactive for **21 days**.
            
            Please check whether you need to:
            - Resolve merge conflicts
            - Respond to review feedback
            - Update the code
            
            **This pull request will close automatically if it is not updated within 14 days.**
          close-pr-message: |
            🔒 This pull request was closed automatically because it remained inactive.
            
            If you still want to merge these changes, reopen this pull request or create a new one.
          
          # ===== Exclusions =====
          # Do not mark items with these labels as stale.
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # Exclude draft pull requests.
          exempt-draft-pr: true
          
          # ===== Other settings =====
          # Maximum number of operations per run.
          operations-per-run: 50
          
          # Restrict processing to these labels when configured.
          only-labels: ''
          
          # Remove the stale label when an item receives new activity.
          remove-stale-when-updated: true
          
          # In debug mode, report actions without applying them.
          debug-only: false
