name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔎 Change Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🧭 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/dsa-web/**'
              - 'api/**'
              - 'src/config.py'
              - 'src/core/config_registry.py'
              - 'src/llm/**'
              - 'src/repositories/**'
              - 'src/schemas/**'
              - 'src/services/**'
              - 'src/storage.py'
              - 'src/auth.py'
              - 'src/analyzer.py'
              - 'main.py'
              - 'requirements.txt'
              - '.github/requirements-ci.txt'
              - '.github/workflows/ci.yml'

  ai-governance:
    name: ai-governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 🤖 Check AI governance assets
        run: python scripts/check_ai_assets.py

  backend-gate:
    name: backend-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ai-governance]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/requirements-ci.txt
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            if python -m pip install -r .github/requirements-ci.txt; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency install failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
            sleep 15
          done
      - name: 🧭 Native runtime isolation (no PydanticAI)
        run: |
          python -c "
          import importlib.util
          assert importlib.util.find_spec('pydantic_ai') is None, \
              'pydantic_ai must not be present in the native gate'
          from src.agent.runtime.pydantic_ai_adapter import is_pydantic_ai_available
          assert is_pydantic_ai_available() is False
          from src.agent import factory  # native factory imports without pydantic-ai
          from src.agent.runtime.native_adapter import NativeRuntimeAdapter  # noqa: F401
          from src.agent.runtime.contract import ExecutionContext  # noqa: F401
          print('✅ native gate has no pydantic-ai dependency')
          "
      - name: ✅ Python syntax check
        run: ./scripts/ci_gate.sh syntax
      - name: ✅ Flake8 critical checks
        run: ./scripts/ci_gate.sh flake8
      - name: ✅ Local deterministic checks
        run: ./scripts/ci_gate.sh deterministic
      - name: ✅ Offline test suite
        run: ./scripts/ci_gate.sh offline-tests

  pydanticai-installed:
    name: pydanticai-installed
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ai-governance]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/requirements-ci.txt
            requirements-pydanticai.txt
      - name: 📦 Install dependencies (native + optional PydanticAI)
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            if python -m pip install -r .github/requirements-ci.txt -r requirements-pydanticai.txt; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency install failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
            sleep 15
          done
      - name: 🔎 Assert PydanticAI import and version
        run: |
          python -c "
          import importlib.metadata as metadata
          import pydantic_ai  # noqa: F401
          print('pydantic-ai-slim', metadata.version('pydantic-ai-slim'))
          from src.agent.runtime.pydantic_ai_adapter import is_pydantic_ai_available
          assert is_pydantic_ai_available() is True
          print('✅ pydantic_ai importable in the installed matrix')
          "
      - name: ✅ Experimental runtime tests (skips are failures)
        env:
          STOCKPULSE_REQUIRE_PYDANTIC_AI: '1'
        run: |
          test_data_dir="$(mktemp -d)"
          set +e
          DATABASE_PATH="${test_data_dir}/stockpulse-ci.sqlite" \
            python -m pytest -m "not network" -rs \
            tests/agent/runtime/test_pydantic_ai_adapter.py \
            tests/agent/runtime/test_tool_session.py \
            tests/agent/runtime/test_conformance.py \
            tests/agent/runtime/test_conformance_replay.py \
            tests/agent/runtime/test_pydantic_ai_real_bridge.py \
            tests/agent/runtime/test_conformance_leak_scan.py \
            > /tmp/pydanticai_pytest.log 2>&1
          status=$?
          set -e
          cat /tmp/pydanticai_pytest.log
          rm -rf "${test_data_dir}"
          if [ "${status}" -ne 0 ]; then
            exit "${status}"
          fi
          if grep -Eq "[0-9]+ skipped" /tmp/pydanticai_pytest.log; then
            echo "::error::installed matrix must execute PydanticAI tests, not skip them (AR-RF-09)" >&2
            exit 1
          fi

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ai-governance]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🐳 Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: stock-analysis:test
          load: true
          cache-from: type=gha,scope=stock-analysis-ci-docker
          cache-to: type=gha,mode=max,scope=stock-analysis-ci-docker,ignore-error=true
      - name: 🐳 Docker smoke
        run: docker run --rm stock-analysis:test python -c "print('✅ Docker OK')"
      - name: 🔍 Docker smoke imports
        run: |
          docker run --rm stock-analysis:test python -c "
          from src.config import get_config; print('✅ config')
          from src.storage import DatabaseManager; print('✅ storage')
          from src.migrations.registry import TARGET_VERSION, get_migrations
          migration_ids = [migration.id for migration in get_migrations()]
          assert migration_ids and migration_ids[-1] == TARGET_VERSION
          print(f'✅ migrations target {TARGET_VERSION}')
          from src.notification import NotificationService; print('✅ notification')
          from data_provider import DataFetcherManager; print('✅ data_provider')
          from src.analyzer import GeminiAnalyzer; print('✅ analyzer')
          from src.patches.eastmoney_patch import eastmoney_patch; print('✅ patch')
          from bot.dispatcher import CommandDispatcher; print('✅ bot')
          from api.app import app; print('✅ api')
          print('✅ All Docker imports OK')
          "
      - name: 🗃️ Docker legacy volume migration smoke
        shell: bash
        run: |
          set -euo pipefail

          volume_name="stockpulse-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fixture_path="${GITHUB_WORKSPACE}/tests/fixtures/schema_migrations/v3_20_0.sql"
          docker volume create "${volume_name}" >/dev/null
          trap 'docker volume rm -f "${volume_name}" >/dev/null' EXIT

          docker run --rm \
            --mount "type=volume,source=${volume_name},target=/app/data" \
            --mount "type=bind,source=${fixture_path},target=/tmp/v3_20_0.sql,readonly" \
            stock-analysis:test python -c "
          from pathlib import Path
          import os
          import sqlite3

          database_path = Path('/app/data/stock_analysis.db')
          assert os.getuid() == 1000
          assert not database_path.exists()
          with sqlite3.connect(database_path) as connection:
              connection.executescript(
                  Path('/tmp/v3_20_0.sql').read_text(encoding='utf-8')
              )
          print('✅ Legacy v3.20.0 fixture loaded into /app/data')
          "

          run_migration_smoke() {
            local phase="$1"
            docker run --rm \
              --env "MIGRATION_SMOKE_PHASE=${phase}" \
              --mount "type=volume,source=${volume_name},target=/app/data" \
              stock-analysis:test python -c "
          from pathlib import Path
          import os

          from src.migrations.registry import TARGET_VERSION, get_migrations
          from src.migrations.runner import MigrationRunner
          from src.storage import DatabaseManager

          assert os.getuid() == 1000
          database = DatabaseManager()
          expected_migrations = [
              (migration.id, migration.description, migration.checksum)
              for migration in get_migrations()
          ]
          with database._engine.connect() as connection:
              migration_rows = [
                  tuple(row)
                  for row in connection.exec_driver_sql(
                      'SELECT version, description, checksum, applied_at '
                      'FROM schema_migrations ORDER BY version'
                  ).fetchall()
              ]
              assert [row[:3] for row in migration_rows] == expected_migrations
              assert all(row[2] and len(row[2]) == 64 for row in migration_rows)
              assert connection.exec_driver_sql(
                  'SELECT code, data_source FROM stock_daily WHERE id = 1'
              ).one() == ('TEST0001', 'fixture')
              assert connection.exec_driver_sql(
                  'SELECT query_id FROM analysis_history WHERE id = 1'
              ).scalar_one() == 'fixture-query-001'
              assert connection.exec_driver_sql(
                  'SELECT owner_id FROM portfolio_accounts WHERE id = 1'
              ).scalar_one() == 'fixture-owner'
              assert connection.exec_driver_sql(
                  'SELECT trade_uid FROM portfolio_trades WHERE id = 1'
              ).scalar_one() == 'fixture-trade-001'

          verification = MigrationRunner().verify(database._engine)
          assert verification.success is True
          assert verification.current_version == TARGET_VERSION
          assert verification.pending_ids == ()

          snapshot_path = Path('/app/data/migration-smoke-applied-at.txt')
          applied_at_snapshot = '\n'.join(
              f'{row[0]}\t{row[3]}' for row in migration_rows
          )
          assert all(row[3] for row in migration_rows)
          if os.environ['MIGRATION_SMOKE_PHASE'] == 'initial':
              snapshot_path.write_text(applied_at_snapshot, encoding='utf-8')
          else:
              assert snapshot_path.read_text(encoding='utf-8') == applied_at_snapshot
          print(f'✅ Legacy volume migration {os.environ[\"MIGRATION_SMOKE_PHASE\"]}')
          "
          }

          run_migration_smoke initial
          run_migration_smoke restart

  web-gate:
    name: web-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, ai-governance]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: apps/dsa-web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json
      - name: 📦 Install
        run: npm ci
      - name: 🔎 Lint
        run: npm run lint
      - name: 🌐 i18n guards
        run: npm run test:i18n
      - name: 🧪 Unit tests
        run: npm run test
      - name: 🏗️ Build
        run: npm run build

  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, ai-governance]
    if: needs.changes.outputs.frontend == 'true'
    env:
      DSA_PLAYWRIGHT_ARTIFACT_CANARY: stockpulse-playwright-canary-7f91c2a6b43d
      DSA_WEB_E2E_RUN_ID: ci-secret-bearing
      DSA_WEB_E2E_CREDENTIAL_BEARING: "true"
      DSA_WEB_E2E_TRACE: "off"
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/requirements-ci.txt
      - name: 📦 Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            if python -m pip install -r .github/requirements-ci.txt; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency install failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
            sleep 15
          done
      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json
      - name: 📦 Install frontend dependencies
        working-directory: apps/dsa-web
        run: npm ci
      - name: 🔒 Playwright credential safety preflight
        working-directory: apps/dsa-web
        run: npm run test:e2e-security-preflight
      - name: 🎭 Install Playwright browsers
        working-directory: apps/dsa-web
        run: npx playwright install --with-deps chromium
      - name: 🎭 Playwright e2e (including i18n acceptance)
        working-directory: apps/dsa-web
        env:
          # First-run password for Playwright's isolated ENV_FILE; not a real
          # credential and never written to the repository .env.
          DSA_WEB_SMOKE_PASSWORD: dsa-ci-smoke
          # Seeded through native fetch outside Playwright tracing; browser
          # config responses contain only the application's mask token.
          DSA_WEB_E2E_ALPHA_API_KEY: ${{ env.DSA_PLAYWRIGHT_ARTIFACT_CANARY }}
        run: npm run test:smoke
      - name: 🔐 Scan Playwright artifacts for secrets
        id: artifact_scan
        if: always()
        run: python scripts/scan_playwright_artifacts.py "apps/dsa-web/test-results/${DSA_WEB_E2E_RUN_ID}/"
      - name: 📦 Stage allowlisted Playwright diagnostics
        id: artifact_stage
        if: ${{ always() && steps.artifact_scan.outcome == 'success' }}
        env:
          SOURCE_DIR: apps/dsa-web/test-results/${{ env.DSA_WEB_E2E_RUN_ID }}
          STAGING_DIR: ${{ runner.temp }}/playwright-upload
        run: python scripts/stage_playwright_diagnostics.py "${SOURCE_DIR}" "${STAGING_DIR}"
      - name: 🔐 Scan staged Playwright diagnostics
        id: staged_artifact_scan
        if: ${{ always() && steps.artifact_scan.outcome == 'success' && steps.artifact_stage.outcome == 'success' }}
        run: python scripts/scan_playwright_artifacts.py "${{ runner.temp }}/playwright-upload/"
      - name: 📤 Upload scanned Playwright diagnostics
        if: ${{ always() && steps.artifact_scan.outcome == 'success' && steps.artifact_stage.outcome == 'success' && steps.staged_artifact_scan.outcome == 'success' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: ${{ runner.temp }}/playwright-upload/
          if-no-files-found: error
          retention-days: 7
