name: Auto Tag

permissions: {}

# Trigger when code is pushed to the main branch.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'local/**'
      - '.github/**'
      - 'source/**'

jobs:
  tag:
    runs-on: ubuntu-latest
    # Default: NO tag. Only tag when commit message contains #patch, #minor, or #major.
    if: >-
      contains(github.event.head_commit.message, '#patch') ||
      contains(github.event.head_commit.message, '#minor') ||
      contains(github.event.head_commit.message, '#major')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          INITIAL_VERSION: 2.1.0
          PATCH_STRING_TOKEN: '#patch'
          MINOR_STRING_TOKEN: '#minor'
          MAJOR_STRING_TOKEN: '#major'
