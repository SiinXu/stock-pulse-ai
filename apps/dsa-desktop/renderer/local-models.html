<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data:; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>StockPulse Local Models</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --surface-strong: #eef1f5;
        --border: #d9dee7;
        --text: #18202d;
        --muted: #667085;
        --accent: #007f73;
        --accent-hover: #006b61;
        --blue: #2563eb;
        --blue-hover: #1d4ed8;
        --ready: #16855b;
        --starting: #b26a00;
        --danger: #be123c;
        --track: #e3e7ee;
        --shadow: rgba(16, 24, 40, 0.16);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121419;
          --surface: #1b1e25;
          --surface-strong: #252a33;
          --border: #343a46;
          --text: #f2f4f7;
          --muted: #a8b0bf;
          --accent: #39b8a9;
          --accent-hover: #55c8bb;
          --blue: #78a7ff;
          --blue-hover: #94b9ff;
          --ready: #52c995;
          --starting: #f0ae49;
          --danger: #ff8ba7;
          --track: #2b313c;
          --shadow: rgba(0, 0, 0, 0.38);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        margin: 0;
      }

      body {
        min-height: 100%;
        font-family: "Fira Sans", "IBM Plex Sans", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      button {
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      header {
        padding: 18px 20px 6px;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 12px 20px 22px;
      }

      .card {
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-copy {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-marker {
        width: 11px;
        height: 11px;
        flex: 0 0 11px;
        border-radius: 50%;
        background: var(--starting);
      }

      .status-marker.running {
        background: var(--ready);
      }

      .status-marker.not-installed,
      .status-marker.error {
        background: var(--danger);
      }

      .status-marker.stopped,
      .status-marker.unknown {
        background: var(--muted);
      }

      .status-text {
        font-size: 14px;
        font-weight: 650;
      }

      .status-actions {
        display: flex;
        gap: 8px;
      }

      .button {
        height: 34px;
        padding: 0 13px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
        font-weight: 650;
      }

      .button:hover:not(:disabled),
      .button:focus-visible:not(:disabled) {
        border-color: var(--blue);
        color: var(--blue);
        outline: none;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .button.primary:hover:not(:disabled),
      .button.primary:focus-visible:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        color: #ffffff;
      }

      .section-label {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .preset {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--border);
      }

      .preset:first-of-type {
        border-top: 0;
      }

      .preset-copy {
        min-width: 0;
      }

      .preset-name {
        margin: 0;
        font-size: 13px;
        font-weight: 650;
      }

      .preset-meta {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 11px;
      }

      .installed-badge {
        color: var(--ready);
        font-size: 11px;
        font-weight: 650;
      }

      .progress {
        margin-top: 10px;
      }

      .progress-track {
        height: 8px;
        border-radius: 4px;
        background: var(--track);
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--blue);
        transition: width 160ms ease;
      }

      .progress-text {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 11px;
      }

      .list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 0;
        border-top: 1px solid var(--border);
      }

      .list-item:first-child {
        border-top: 0;
      }

      .list-name {
        font-size: 13px;
        font-weight: 600;
      }

      .empty {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .message {
        min-height: 16px;
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 16px;
      }

      .message.error {
        color: var(--danger);
      }

      .message.info {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Local Models</h1>
      <p class="subtitle">
        Manage a private, on-device model runtime for offline analysis.
      </p>
    </header>

    <main>
      <section class="card">
        <div class="status-row">
          <div class="status-copy">
            <span class="status-marker" id="statusMarker" aria-hidden="true"></span>
            <span class="status-text" id="statusText">Checking…</span>
          </div>
          <div class="status-actions">
            <button class="button" id="detectButton" type="button">Refresh</button>
            <button class="button primary" id="startButton" type="button">Start service</button>
            <button class="button" id="stopButton" type="button" hidden>Stop</button>
            <button class="button" id="installGuideButton" type="button" hidden>Install Ollama</button>
          </div>
        </div>
        <p class="message" id="statusMessage" aria-live="polite"></p>
      </section>

      <section class="card">
        <p class="section-label">Recommended models</p>
        <div id="presetList"></div>
        <div class="progress" id="pullProgress" hidden>
          <div class="progress-track">
            <div class="progress-fill" id="pullProgressFill"></div>
          </div>
          <p class="progress-text" id="pullProgressText"></p>
        </div>
      </section>

      <section class="card">
        <p class="section-label">Installed models</p>
        <ul class="list" id="installedList"></ul>
        <p class="empty" id="installedEmpty">No local models installed yet.</p>
      </section>
    </main>

    <script src="local-models.js" defer></script>
  </body>
</html>
