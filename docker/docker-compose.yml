# ===================================
# A-shares Watchlist Analysis System - Docker Compose
# ===================================
# 
# Usage:
#   Scheduled mode: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI Pattern: docker-compose -f ./docker/docker-compose.yml up -d server
#   Start simultaneously: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # Environment variables (loaded from .env file). Do not mount ../.env as a single volume to /app/.env
  # Otherwise, the Docker mount point will prevent os.replace from performing an atomic update during configuration save.
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # If you need to override frontend static resources, mount the local static directory.
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT is read from .env file, no need to hardcode it here

    # Proxy settings (if needed)
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # Resource limits: Full analysis suggestion 1G+; 512M only suitable for lightweight Web/API, single stock, low concurrency scenarios,
  # And Also Recommend Setting MAX_WORKERS=1 and avoid starting simultaneously analyzer And server.
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M

services:
  # Scheduled task mode.
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI Mode
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # If network_mode: host is used, the following ports mapping is invalid; the port is specified in the command via --port.
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
